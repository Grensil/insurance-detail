<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>보험 상품 상세</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f6f8; color: #222; }

    /* 헤더 */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: #fff; height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px 0 0;
      border-bottom: 1px solid #eee;
    }
    .header-nav { display: flex; align-items: center; }
    .header-btn {
      font-size: 20px; color: #333; background: none; border: none;
      cursor: pointer; padding: 10px 12px; line-height: 1;
    }
    .header-btn:disabled { color: #ccc; }
    .header-close {
      font-size: 13px; font-weight: bold; color: #333;
      background: none; border: none; cursor: pointer;
      padding: 10px 14px;
    }

    /* 상단 히어로 */
    .hero {
      background: linear-gradient(135deg, #1a6bc4 0%, #0d4a94 100%);
      padding: 28px 20px 32px;
      color: white;
    }
    .hero-badge {
      display: inline-block; font-size: 11px; font-weight: bold;
      padding: 3px 10px; border-radius: 20px;
      background: rgba(255,255,255,0.25); color: white;
      margin-bottom: 10px;
    }
    .hero-insurer { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
    .hero-product { font-size: 19px; font-weight: bold; line-height: 1.4; margin-bottom: 20px; }
    .hero-price-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
    .hero-price { font-size: 34px; font-weight: 900; letter-spacing: -1px; }
    .hero-price span { font-size: 16px; font-weight: normal; margin-left: 2px; }
    .hero-discount {
      margin-top: 10px; font-size: 12px;
      background: rgba(255,255,255,0.18); border-radius: 6px;
      padding: 7px 12px; display: inline-block;
    }
    .hero-discount::before { content: "✓  "; }

    /* 섹션 공통 */
    .section { background: #fff; margin: 10px 0; padding: 20px 16px; }
    .section-title {
      font-size: 14px; font-weight: bold; color: #111;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 2px solid #1a6bc4; display: inline-block;
    }

    /* 보장 내역 테이블 */
    .coverage-table { width: 100%; border-collapse: collapse; }
    .coverage-table tr { border-bottom: 1px solid #f0f0f0; }
    .coverage-table tr:last-child { border-bottom: none; }
    .coverage-table td { padding: 12px 4px; font-size: 13px; }
    .coverage-table td:first-child { color: #888; width: 38%; }
    .coverage-table td:last-child { font-weight: bold; color: #222; text-align: right; }
    .coverage-table .included { color: #1a6bc4; }
    .coverage-table .not-included { color: #aaa; }

    /* 할인 혜택 */
    .discount-list { list-style: none; }
    .discount-list li {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px;
    }
    .discount-list li:last-child { border-bottom: none; }
    .discount-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .discount-text { color: #333; line-height: 1.4; }

    /* 유의사항 */
    .notice { background: #f8f9fa; border-radius: 8px; padding: 14px; }
    .notice p { font-size: 11px; color: #999; line-height: 1.7; }

    /* 문의 배너 */
    .inquiry-banner {
      background: #fff; margin: 10px 0; padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .inquiry-banner-text { font-size: 13px; color: #555; }
    .inquiry-banner-text strong { display: block; font-size: 14px; color: #222; margin-bottom: 2px; }
    .inquiry-btns { display: flex; gap: 8px; }
    .btn-call {
      padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: bold;
      cursor: pointer; border: 1.5px solid #1a6bc4; background: #fff; color: #1a6bc4;
      text-decoration: none; display: flex; align-items: center; gap: 4px;
    }
    .btn-sms {
      padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: bold;
      cursor: pointer; border: none; background: #1a6bc4; color: white;
      text-decoration: none; display: flex; align-items: center; gap: 4px;
    }

    /* 바텀 CTA */
    .bottom-cta {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; padding: 12px 16px;
      border-top: 1px solid #eee;
    }
    .btn-apply {
      width: 100%; padding: 15px; border-radius: 10px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      border: none; background: #1a6bc4; color: white;
    }
    .bottom-spacer { height: 80px; }

    /* 태그별 히어로 컬러 */
    body.color-red     .hero { background: linear-gradient(135deg, #c0392b 0%, #922b21 100%); }
    body.color-blue    .hero { background: linear-gradient(135deg, #1a6bc4 0%, #0d4a94 100%); }
    body.color-orange  .hero { background: linear-gradient(135deg, #e67e00 0%, #b35e00 100%); }
    body.color-green   .hero { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); }
    body.color-teal    .hero { background: linear-gradient(135deg, #16a085 0%, #0e6655 100%); }
    body.color-purple  .hero { background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%); }
    body.color-dark    .hero { background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); }
    body.color-crimson .hero { background: linear-gradient(135deg, #e74c3c 0%, #b03a2e 100%); }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-nav">
      <button class="header-btn" onclick="history.back()">&#8249;</button>
      <button class="header-btn" onclick="history.forward()">&#8250;</button>
    </div>
    <button class="header-close" onclick="closeWebView()">닫기</button>
  </div>

  <!-- 히어로 -->
  <div class="hero">
    <div class="hero-badge" id="heroBadge">인기</div>
    <div class="hero-insurer" id="heroInsurer">KB손해보험</div>
    <div class="hero-product" id="heroProduct">KB손해보험 다이렉트 자동차보험</div>
    <div class="hero-price-label">월 예상 보험료</div>
    <div class="hero-price" id="heroPrice">68,000<span>원</span></div>
    <div class="hero-discount" id="heroDiscount">마일리지 할인 적용</div>
  </div>

  <!-- 보장 내역 -->
  <div class="section">
    <div class="section-title">보장 내역</div>
    <table class="coverage-table" id="coverageTable"></table>
  </div>

  <!-- 할인 혜택 -->
  <div class="section">
    <div class="section-title">적용 할인 혜택</div>
    <ul class="discount-list" id="discountList"></ul>
  </div>

  <!-- 유의사항 -->
  <div class="section">
    <div class="section-title">유의사항</div>
    <div class="notice">
      <p>
        · 본 보험료는 예상 금액이며 실제 가입 시 달라질 수 있습니다.<br/>
        · 보험 가입 전 약관 및 상품 설명서를 반드시 읽어보세요.<br/>
        · 자세한 사항은 해당 보험사 고객센터 또는 담당 설계사에게 문의하세요.<br/>
        · 본 화면은 정보 제공 목적이며 청약 효력이 없습니다.
      </p>
    </div>
  </div>

  <!-- 문의 배너 -->
  <div class="inquiry-banner">
    <div class="inquiry-banner-text">
      <strong>전문 설계사 상담</strong>
      평일 09:00 ~ 18:00
    </div>
    <div class="inquiry-btns">
      <a class="btn-call" href="tel:01077002852">📞 전화</a>
      <a class="btn-sms" href="sms:01077002852">💬 문자</a>
    </div>
  </div>

  <div class="bottom-spacer"></div>

  <!-- 바텀 CTA -->
  <div class="bottom-cta">
    <button class="btn-apply" onclick="apply()">보험 가입하기</button>
  </div>

  <script>
    function getParam(key, fallback) {
      var val = new URLSearchParams(location.search).get(key);
      return val !== null ? decodeURIComponent(val) : fallback;
    }

    var insurer    = getParam('insurer',  'KB손해보험');
    var product    = getParam('product',  'KB손해보험 다이렉트 자동차보험');
    var monthly    = getParam('monthly',  '68,000');
    var desc       = getParam('desc',     '대인 무한 / 대물 2억 / 자손 5천만 / 자차 포함');
    var discount   = getParam('discount', '마일리지 할인 적용');
    var tag        = getParam('tag',      '인기');
    var badgeColor = getParam('badge_color', '#1a6bc4');

    document.getElementById('heroBadge').textContent    = tag;
    document.getElementById('heroInsurer').textContent  = insurer;
    document.getElementById('heroProduct').textContent  = product;
    document.getElementById('heroPrice').innerHTML      = monthly + '<span>원</span>';
    document.getElementById('heroDiscount').textContent = discount;

    var colorMap = {
      '#c0392b': 'red', '#1a6bc4': 'blue', '#e67e00': 'orange',
      '#27ae60': 'green', '#16a085': 'teal', '#8e44ad': 'purple',
      '#2c3e50': 'dark',  '#e74c3c': 'crimson'
    };
    document.body.classList.add('color-' + (colorMap[badgeColor] || 'blue'));
    document.getElementById('heroBadge').style.background = badgeColor;

    var coverageTable = document.getElementById('coverageTable');
    var parts = desc.split(' / ');
    var labels = ['대인배상', '대물배상', '자동차상해', '자기차량손해'];
    parts.forEach(function(part, i) {
      var tr = document.createElement('tr');
      var included = part.indexOf('미포함') === -1;
      tr.innerHTML =
        '<td>' + (labels[i] || '') + '</td>' +
        '<td class="' + (included ? 'included' : 'not-included') + '">' +
          (included ? '✓ ' : '✗ ') + part.replace('자차 포함','포함').replace('자차 미포함','미포함') +
        '</td>';
      coverageTable.appendChild(tr);
    });

    var discountList = document.getElementById('discountList');
    var discounts = [
      { icon: '🎯', text: discount },
      { icon: '📱', text: '온라인 다이렉트 가입 시 대면 채널 대비 평균 15% 저렴' },
      { icon: '🔒', text: '가입 후 1년간 보험료 동결 보장' },
      { icon: '🚘', text: '무사고 시 다음 해 보험료 할인 자동 적용' },
    ];
    discounts.forEach(function(d) {
      var li = document.createElement('li');
      li.innerHTML = '<span class="discount-icon">' + d.icon + '</span><span class="discount-text">' + d.text + '</span>';
      discountList.appendChild(li);
    });

    function apply() {
      var params = new URLSearchParams(location.search).toString();
      location.href = 'terms.html' + (params ? '?' + params : '');
    }

    function closeWebView() {
      try { webkit.messageHandlers.cordova_iab.postMessage(JSON.stringify({ action: 'close' })); } catch(e) { window.close(); }
    }
  </script>
</body>
</html>
